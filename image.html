
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: rgb(25, 104, 101);
        }

        h1 {
            text-align: center;
        color: bisque;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 100px;
            margin: auto;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>My Image Gallery</h1>

    <div>

<class="gallery">
        <img src="https://cdn.pixabay.com/photo/2015/06/19/20/13/sunset-815270_1280.jpg">
        <img src="https://cdn.pixabay.com/photo/2024/01/29/17/37/ai-generated-8540486_1280.png">
<img src="  https://cdn.pixabay.com/photo/2023/04/19/09/34/flower-7937334_1280.jpg">
        <img src="https://cdn.pixabay.com/photo/2022/03/31/08/50/landscape-7102517_1280.jpg">
        <img src="  https://cdn.pixabay.com/photo/2024/05/22/21/51/dog-8781844_1280.jpg">
        <img src=""
        <img src="https://cdn.pixabay.com/photo/2017/11/15/13/27/river-2951997_1280.jpg">
        
    
    </div>

</body>
</html>
