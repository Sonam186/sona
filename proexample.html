<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple promise example</title>
</head>
<body>
    <h2>promise example</h2>
    <script>
        let mypromise = new Promise((resolve,reject) =>{
            let marks=86;
            if (marks>33){
                resolve("pass");

            }
            else{
                 reject("Fail");

            }
        });
        mypromise.then((marks)=>{
            console.log(marks)
        }).catch((err)=>{
            console.log(err)
        });

    </script>
    
</body>
</html>
